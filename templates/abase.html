<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestor de Egresos{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
      <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('inicio') }}">
                <i class="fas fa-tasks"></i> Gestor de Egresos ORM
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('inicio') }}">
                    <i class="fas fa-home"></i> Inicio
                </a>
                <a class="nav-link" href="{{ url_for('crear_egreso') }}">
                    <i class="fas fa-plus"></i> Nuevo Egreso
                </a>
                <a class="nav-link" href="{{ url_for('buscar_egreso') }}">
                    <i class="fas fa-search"></i> Buscar
                </a>
            </div>
        </div>
    </nav>
   
    <div class="container mt-4">
 {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>



    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
